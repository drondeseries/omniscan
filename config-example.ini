[server]
type = plex
url = http://localhost:8096
api_key = your_api_key_here

[plex]
server = http://localhost:32400
token = your_plex_token_here

[scan]
directories = /path/to/media
# library_extensions = .mkv,.mp4,.avi,.mov,.wmv,.flv,.webm,.m4v,.m4p,.m4b,.m4r,.3gp,.mpg,.mpeg,.m2v,.m2ts,.ts,.vob,.iso,.strm,.mp3,.flac,.m4a,.wav,.ogg,.opus,.wma
# Add .epub,.mobi,.azw3,.cbz,.cbr for Readarr + Plex Books libraries

[behaviour]
scan_workers = 4
scan_debounce = 10
scan_delay = 1.0
watch = false
run_interval = 24
run_on_startup = true
start_time = 
incremental_scan = true
scan_since_days = 7
symlink_check = true
deletion_threshold = 50
abort_on_mass_deletion = true
integrity_check = false
ffprobe_check = false

[notifications]
enabled = false
discord_webhook_url = your_discord_webhook_url_here

[ignore]
patterns = .*, @eaDir, #recycle

[logs]
loglevel = INFO

[web]
username = admin
password = admin
# Set auth_disabled = true to allow access without login (e.g. trusted local networks)
# auth_disabled = false
